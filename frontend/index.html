<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Match Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">
        <aside class="hero">
            <div class="hero-inner">
                <div class="hero-title">Predict IPL Match Winners</div>
                <div class="hero-sub">Fast, intuitive predictions powered by a lightweight ML model.</div>
                <div class="hero-stats">
                    <div class="stat"><div class="num">10</div><div class="lbl">Teams</div></div>
                    <div class="stat"><div class="num">1000+</div><div class="lbl">Matches (data)</div></div>
                    <div class="stat"><div class="num">Instant</div><div class="lbl">Predictions</div></div>
                </div>
            </div>
        </aside>

        <main class="panel">
            <div class="panel-card">
                <div class="panel-header">
                    <div class="logo-big">🏏</div>
                    <div>
                        <h2>Match Setup</h2>
                        <p class="muted">Provide match details and get a prediction</p>
                    </div>
                </div>

                <form id="predictionForm" class="form-grid">
                    <div class="form-group">
                        <label for="team1">Team 1</label>
                        <select id="team1" name="team1" required>
                            <option value="">Select Team 1</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="team2">Team 2</label>
                        <select id="team2" name="team2" required>
                            <option value="">Select Team 2</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="toss_winner">Toss Winner</label>
                        <select id="toss_winner" name="toss_winner" required>
                            <option value="">Select Toss Winner</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="toss_decision">Toss Decision</label>
                        <select id="toss_decision" name="toss_decision" required>
                            <option value="">Select Decision</option>
                            <option value="bat">Bat</option>
                            <option value="field">Field</option>
                        </select>
                    </div>

                    <div class="form-group full">
                        <label for="venue">Venue</label>
                        <select id="venue" name="venue" required>
                            <option value="">Select Venue</option>
                        </select>
                    </div>

                    <div class="form-actions full">
                        <button type="submit" class="predict-btn">Predict Winner</button>
                    </div>
                </form>

                <div id="result" class="result hidden">
                    <h3>Prediction</h3>
                    <p id="predictionText"></p>
                </div>

                <div id="error" class="error hidden">
                    <p id="errorText"></p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
